name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API config from secret (optional)
        run: |
          API_URL="${{ secrets.BACKEND_API_URL }}"
          if [ -n "$API_URL" ]; then
            API_URL="${API_URL%/}"
            case "$API_URL" in
              */api) ;;
              *) API_URL="$API_URL/api" ;;
            esac
            echo "Using BACKEND_API_URL secret for frontend/api-config.js"
            echo "window.__API_BASE_URL = '${API_URL}';" > frontend/api-config.js
          else
            echo "BACKEND_API_URL secret not set; keeping repository frontend/api-config.js as-is"
          fi

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false
